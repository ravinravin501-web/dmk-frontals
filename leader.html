<!DOCTYPE html>
<html lang="ta">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>திமுக முன்னணி கன்னியாகுமரி</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
    
    .back-container{
    text-align:center;
    margin:40px 0;
}

.back-btn{
    display:inline-block;
    background:red;
    color:white;
    padding:12px 25px;
    font-size:18px;
    font-weight:bold;
    text-decoration:none;
    border-radius:8px;
    transition:0.3s;
    box-shadow:0 5px 15px rgba(255,0,0,0.3);
}

.back-btn:hover{
    background:#b30000;
    transform:scale(1.05);
}

/* RESET */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:linear-gradient(to bottom, #111, #f5f5f5);
    overflow-x:hidden;
}

/* TITLE */
.section-title{
    text-align:center;
    margin:70px 0 40px;
    font-size:50px;
    font-weight:bold;
    color:white;
}

.section-title span{
    color:red;
}

/* CARDS */
.card-container{
    width:92%;
    margin:auto;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:35px;
    margin-bottom:80px;
}

/* CARD STYLE */
.card{
    background:white;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 10px 30px rgba(255,0,0,0.2);
    transition:0.4s;
    border-top:6px solid red;
}

.card:hover{
    transform:translateY(-10px);
    box-shadow:0 15px 40px rgba(255,0,0,0.4);
}

.card img{
    width:100%;
    height:280px;
    object-fit:cover;
}

.card-content{
    padding:25px;
    text-align:center;
}

.card-content h2{
    color:red;
    margin-bottom:15px;
    font-size:30px;
}

.card-content p{
    color:#444;
    font-size:18px;
    line-height:1.8;
    margin-top:10px;
}

/* FOOTER */
.footer{
    background:#000;
    color:white;
    padding:60px 20px;
    text-align:center;
    border-top:5px solid red;
}

.footer-logo{
    width:90px;
    margin-bottom:20px;
}

.social-icons i{
    font-size:28px;
    margin:0 14px;
    color:red;
}

/* MOBILE */
@media(max-width:768px){

.section-title{
    font-size:34px;
}

.card-content h2{
    font-size:24px;
}

}

</style>

</head>

<body>

<!-- TITLE -->
<div class="section-title">
    எங்கள் <span>வேட்பாளர்கள்</span>
</div>

<!-- CARDS -->
<div class="card-container">

    <!-- AUSTIN -->
    <div class="card">
        <img src="astin.jpg">
        <div class="card-content">
            <h2>எஸ். ஆஸ்டின்</h2>
            <p>நாகர்கோவில் சட்டமன்ற தொகுதி வேட்பாளர்</p>
            <p>“மக்களுக்காக உழைப்பதே என் இலக்கு”</p>
        </div>
    </div>

    <!-- MAGESH -->
    <div class="card">
        <img src="magesh.jpg">
        <div class="card-content">
            <h2>எம். மகேஷ்</h2>
            <p>கன்னியாகுமரி சட்டமன்ற தொகுதி வேட்பாளர்</p>
            <p>“தமிழக வளர்ச்சிக்காக இணைந்து செயல்படுவோம்”</p>
        </div>
    </div>

</div>
    <div class="back-container">
    <a href="index.html" class="back-btn">⬅ முகப்பு செல்ல</a>
    </div>

<!-- FOOTER -->
<div class="footer">
    <img src="sunrise.png" class="footer-logo">
    <h2>திமுக முன்னணி</h2>

    <p>© 2025 அனைத்து உரிமைகளும் பாதுகாக்கப்பட்டவை</p>

    <div class="social-icons">
        <i class="fab fa-facebook"></i>
        <i class="fab fa-instagram"></i>
        <i class="fab fa-twitter"></i>
        <i class="fab fa-youtube"></i>
    </div>
</div>

</body>
</html>
